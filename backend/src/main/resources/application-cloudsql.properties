# Cloud SQL profile (MySQL)
#
# Intended for Cloud Run + Cloud SQL. This uses the Cloud SQL Java Connector (JDBC Socket Factory).
# Required env vars:
#   INSTANCE_CONNECTION_NAME   e.g. "my-project:asia-southeast2:my-sql"
#   DB_NAME                    e.g. "voucherpromo"
#   DB_USER                    e.g. "app"
#   DB_PASSWORD                SQL user's password
#
# Activate with: SPRING_PROFILES_ACTIVE=cloudsql

spring.datasource.url=jdbc:mysql:///${DB_NAME:voucherpromo}
spring.datasource.username=${DB_USER:app}
spring.datasource.password=${DB_PASSWORD:${DB_PASS:app}}

spring.datasource.hikari.data-source-properties.socketFactory=com.google.cloud.sql.mysql.SocketFactory
spring.datasource.hikari.data-source-properties.cloudSqlInstance=${INSTANCE_CONNECTION_NAME}
# Prefer "lazy" to avoid the refresh thread getting throttled on serverless platforms.
spring.datasource.hikari.data-source-properties.cloudSqlRefreshStrategy=lazy

# Use migrations (Flyway) + schema validation like local MySQL.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

