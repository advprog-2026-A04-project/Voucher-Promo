# Cloud Run profile – uses H2 in-memory DB so no external MySQL is required.
# Activated by setting SPRING_PROFILES_ACTIVE=cloudrun in the Cloud Run service.

spring.datasource.url=jdbc:h2:mem:voucherpromo;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=update
