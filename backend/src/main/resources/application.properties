spring.application.name=voucher-promo

server.port=${PORT:8080}

# H2 In-Memory Database (Fallback)
spring.datasource.url=jdbc:h2:mem:voucherpromo;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info

# Demo-only admin guard for POST /admin/vouchers
app.admin-token=${ADMIN_TOKEN:dev-admin-token}

# Business time zone for voucher start/end window checks (defaults to system time zone).
app.time-zone=${APP_TIME_ZONE:}
