name: Deploy (AWS ECR + App Runner)

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        type: choice
        required: true
        options:
          - staging
          - prod
        default: staging

concurrency:
  group: deploy-aws
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  staging:
    name: Deploy staging
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    runs-on: ubuntu-latest
    environment: aws-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub config (OIDC role or access keys)
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          if [[ -z "${AWS_REGION}" ]]; then
            echo "::warning::Missing GitHub Environment Variable: AWS_REGION"
            missing=1
          fi

          push_private=false
          push_public=false
          if [[ -n "${ECR_REPOSITORY}" ]]; then
            push_private=true
          fi
          if [[ -n "${ECR_PUBLIC_URI}" ]]; then
            push_public=true
          fi
          if [[ "${push_private}" == "false" && "${push_public}" == "false" ]]; then
            echo "::warning::Missing GitHub Environment Variable: ECR_REPOSITORY or ECR_PUBLIC_URI"
            missing=1
          fi

          mode=""
          if [[ -n "${AWS_ROLE_TO_ASSUME}" ]]; then
            mode="oidc"
          elif [[ -n "${AWS_ACCESS_KEY_ID}" && -n "${AWS_SECRET_ACCESS_KEY}" ]]; then
            mode="keys"
          else
            echo "::warning::Missing AWS credentials config. Set AWS_ROLE_TO_ASSUME (recommended) OR AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY (fallback)."
            missing=1
          fi

          if [[ "${missing}" -eq 1 ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "AWS deploy is disabled (missing variables)."
            exit 0
          fi

          echo "enabled=true" >> "${GITHUB_OUTPUT}"
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "push_private=${push_private}" >> "${GITHUB_OUTPUT}"
          echo "push_public=${push_public}" >> "${GITHUB_OUTPUT}"

          has_session_token=false
          if [[ "${mode}" == "keys" && -n "${AWS_SESSION_TOKEN}" ]]; then
            has_session_token=true
          fi
          echo "has_session_token=${has_session_token}" >> "${GITHUB_OUTPUT}"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_PUBLIC_URI: ${{ vars.ECR_PUBLIC_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Configure AWS credentials (access keys + session token)
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.mode == 'keys' && steps.cfg.outputs.has_session_token == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Configure AWS credentials (access keys)
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.mode == 'keys' && steps.cfg.outputs.has_session_token == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR (private)
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.push_private == 'true'
        id: ecr_private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Amazon ECR Public
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.push_public == 'true'
        shell: bash
        run: |
          set -euo pipefail
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Set up Docker Buildx
        if: steps.cfg.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags (staging)
        if: steps.cfg.outputs.enabled == 'true'
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tags=()

          if [[ "${PUSH_PRIVATE}" == "true" ]]; then
            if [[ -z "${PRIVATE_REGISTRY}" || -z "${ECR_REPOSITORY}" ]]; then
              echo "::error::Internal config error: private ECR enabled but registry/repository missing."
              exit 1
            fi
            tags+=( "${PRIVATE_REGISTRY}/${ECR_REPOSITORY}:staging" )
            tags+=( "${PRIVATE_REGISTRY}/${ECR_REPOSITORY}:staging-${GITHUB_SHA}" )
          fi

          if [[ "${PUSH_PUBLIC}" == "true" ]]; then
            if [[ -z "${ECR_PUBLIC_URI}" ]]; then
              echo "::error::Internal config error: public ECR enabled but ECR_PUBLIC_URI missing."
              exit 1
            fi
            tags+=( "${ECR_PUBLIC_URI}:staging" )
            tags+=( "${ECR_PUBLIC_URI}:staging-${GITHUB_SHA}" )
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          PUSH_PRIVATE: ${{ steps.cfg.outputs.push_private }}
          PUSH_PUBLIC: ${{ steps.cfg.outputs.push_public }}
          PRIVATE_REGISTRY: ${{ steps.ecr_private.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_PUBLIC_URI: ${{ vars.ECR_PUBLIC_URI }}

      - name: Build and push image (staging)
        if: steps.cfg.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger App Runner deployment (staging)
        if: steps.cfg.outputs.enabled == 'true' && vars.APPRUNNER_SERVICE_ARN != ''
        shell: bash
        run: |
          set -euo pipefail
          aws apprunner start-deployment --service-arn "${APPRUNNER_SERVICE_ARN}"
        env:
          APPRUNNER_SERVICE_ARN: ${{ vars.APPRUNNER_SERVICE_ARN }}

  prod:
    name: Deploy production
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'prod')
    runs-on: ubuntu-latest
    environment: aws-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub config (OIDC role or access keys)
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          if [[ -z "${AWS_REGION}" ]]; then
            echo "::warning::Missing GitHub Environment Variable: AWS_REGION"
            missing=1
          fi

          push_private=false
          push_public=false
          if [[ -n "${ECR_REPOSITORY}" ]]; then
            push_private=true
          fi
          if [[ -n "${ECR_PUBLIC_URI}" ]]; then
            push_public=true
          fi
          if [[ "${push_private}" == "false" && "${push_public}" == "false" ]]; then
            echo "::warning::Missing GitHub Environment Variable: ECR_REPOSITORY or ECR_PUBLIC_URI"
            missing=1
          fi

          mode=""
          if [[ -n "${AWS_ROLE_TO_ASSUME}" ]]; then
            mode="oidc"
          elif [[ -n "${AWS_ACCESS_KEY_ID}" && -n "${AWS_SECRET_ACCESS_KEY}" ]]; then
            mode="keys"
          else
            echo "::warning::Missing AWS credentials config. Set AWS_ROLE_TO_ASSUME (recommended) OR AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY (fallback)."
            missing=1
          fi

          if [[ "${missing}" -eq 1 ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "AWS deploy is disabled (missing variables)."
            exit 0
          fi

          echo "enabled=true" >> "${GITHUB_OUTPUT}"
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "push_private=${push_private}" >> "${GITHUB_OUTPUT}"
          echo "push_public=${push_public}" >> "${GITHUB_OUTPUT}"

          has_session_token=false
          if [[ "${mode}" == "keys" && -n "${AWS_SESSION_TOKEN}" ]]; then
            has_session_token=true
          fi
          echo "has_session_token=${has_session_token}" >> "${GITHUB_OUTPUT}"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_PUBLIC_URI: ${{ vars.ECR_PUBLIC_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Configure AWS credentials (access keys + session token)
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.mode == 'keys' && steps.cfg.outputs.has_session_token == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Configure AWS credentials (access keys)
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.mode == 'keys' && steps.cfg.outputs.has_session_token == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR (private)
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.push_private == 'true'
        id: ecr_private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Amazon ECR Public
        if: steps.cfg.outputs.enabled == 'true' && steps.cfg.outputs.push_public == 'true'
        shell: bash
        run: |
          set -euo pipefail
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Set up Docker Buildx
        if: steps.cfg.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags (prod)
        if: steps.cfg.outputs.enabled == 'true'
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          tags=()

          if [[ "${PUSH_PRIVATE}" == "true" ]]; then
            if [[ -z "${PRIVATE_REGISTRY}" || -z "${ECR_REPOSITORY}" ]]; then
              echo "::error::Internal config error: private ECR enabled but registry/repository missing."
              exit 1
            fi
            tags+=( "${PRIVATE_REGISTRY}/${ECR_REPOSITORY}:prod" )
            tags+=( "${PRIVATE_REGISTRY}/${ECR_REPOSITORY}:prod-${GITHUB_SHA}" )
          fi

          if [[ "${PUSH_PUBLIC}" == "true" ]]; then
            if [[ -z "${ECR_PUBLIC_URI}" ]]; then
              echo "::error::Internal config error: public ECR enabled but ECR_PUBLIC_URI missing."
              exit 1
            fi
            tags+=( "${ECR_PUBLIC_URI}:prod" )
            tags+=( "${ECR_PUBLIC_URI}:prod-${GITHUB_SHA}" )
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          PUSH_PRIVATE: ${{ steps.cfg.outputs.push_private }}
          PUSH_PUBLIC: ${{ steps.cfg.outputs.push_public }}
          PRIVATE_REGISTRY: ${{ steps.ecr_private.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_PUBLIC_URI: ${{ vars.ECR_PUBLIC_URI }}

      - name: Build and push image (prod)
        if: steps.cfg.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger App Runner deployment (prod)
        if: steps.cfg.outputs.enabled == 'true' && vars.APPRUNNER_SERVICE_ARN != ''
        shell: bash
        run: |
          set -euo pipefail
          aws apprunner start-deployment --service-arn "${APPRUNNER_SERVICE_ARN}"
        env:
          APPRUNNER_SERVICE_ARN: ${{ vars.APPRUNNER_SERVICE_ARN }}
